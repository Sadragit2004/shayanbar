{% load render_partial %}

<style>
/* رَپِر برای چسباندن باکس شماره به دکمه و ثابت کردن پایینِ راست */
.floating-call-wrapper{
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;              /* فاصله بین دکمه و باکس شماره */
  flex-direction: row-reverse; /* دکمه سمت راست باشد */
  z-index: 9999;
}

/* دکمه دایره‌ای */
.floating-call-btn{
  width: 56px;height: 56px;border-radius: 50%;
  display:flex;align-items:center;justify-content:center;
  background: #007bff;color:#fff;cursor:pointer;border:0;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  transition: transform .2s ease, background-color .2s ease;
}
.floating-call-btn:hover{ background:#0062cc; transform: translateY(-1px); }
.floating-call-btn:active{ transform: translateY(0); }

/* باکس شماره: نازک، خودکار به اندازه متن، اسلاید از راست */
.call-number-box{
  background:#fff;color:#222;border-radius: 32px;
  padding: 8px 14px; font-size: 14px; line-height: 1;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  white-space: nowrap; max-width: 80vw; overflow: hidden; text-overflow: ellipsis;
  transform: scaleX(0); transform-origin: right center;
  opacity: 0; pointer-events: none; transition: transform .24s ease, opacity .24s ease;
  border: 1px solid rgba(0,0,0,.06);
}
.call-number-box.open{
  transform: scaleX(1); opacity: 1; pointer-events: auto;
}

/* هینت کوچک بالای دکمه */
.call-hint{
  position: fixed; right: 20px; bottom: 86px;
  background: rgba(255,255,255,.9); color:#333; font-size: 12px;
  padding: 4px 8px; border-radius: 6px; box-shadow:0 4px 12px rgba(0,0,0,.15);
  z-index: 9999;
}

/* احترام به کاربرانی که motion رو کم می‌خواهند */
@media (prefers-reduced-motion: reduce){
  .call-number-box{ transition: none; }
  .floating-call-btn{ transition: none; }
}
</style>

<div class="floating-call-wrapper" dir="rtl" aria-live="polite">
  <div class="call-number-box" id="callNumber" aria-hidden="true">
    <span id="callNumberText">{% render_partial 'company:mobile_number' %}</span>
  </div>
  <button id="callBtn" class="floating-call-btn" aria-label="نمایش شماره / تماس">
    📞
  </button>
</div>

<div class="call-hint">برای تماس دو ضربه بزنید</div>

<script>
(function(){
  const btn = document.getElementById('callBtn');
  const box = document.getElementById('callNumber');
  const numberEl = document.getElementById('callNumberText');

  let singleTimer = null;
  let lastTap = 0;

  function toggleNumber(){
    const isOpen = box.classList.contains('open');
    box.classList.toggle('open', !isOpen);
    box.setAttribute('aria-hidden', isOpen ? 'true' : 'false');
  }

  function getTel(){
    const raw = (numberEl.textContent || '').trim();
    // فقط + و ارقام باقی بماند
    const tel = raw.replace(/[^\d+]/g,'');
    return tel || raw;
  }

  function callNow(){
    const tel = getTel();
    if(tel){
      window.location.href = 'tel:' + tel;
    }
  }

  // منطق: تک‌ضربه = نمایش شماره، دوبار ضربه = تماس
  btn.addEventListener('click', function(){
    const now = Date.now();
    const delta = now - lastTap;

    if (delta > 0 && delta < 300){ // دوبار ضربه
      clearTimeout(singleTimer);
      lastTap = 0;
      callNow();
    } else {
      lastTap = now;
      singleTimer = setTimeout(()=>{
        toggleNumber();   // تک‌ضربه
        lastTap = 0;
      }, 300);
    }
  });

  // دسترس‌پذیری: Enter/Space معادل تک‌ضربه، Ctrl+Enter = تماس
  btn.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      toggleNumber();
    } else if(e.key.toLowerCase() === 'enter' && (e.ctrlKey || e.metaKey)){
      e.preventDefault();
      callNow();
    }
  });
})();
</script>
