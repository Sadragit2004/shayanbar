{% load render_partial %}
{% for i in sliders %}
<div class="row gy-70 align-items-center">
    <!-- تصویر -->
    <div class="col-lg-6 offset-lg-1 order-lg-2">
        <img class="w-100 rounded-4 shadow mb-lg-n210 rellax no-transform-lg"
             loading="lazy"
             src="{{ media_url }}{{ i.image_name }}"
             alt="{{ i.title }}">
    </div>

    <!-- متن و دکمه‌ها -->
    <div class="col-lg-5">
        <h1 class="text-white mb-45">
            <span class="highlight">خدمات باربری </span>{{ i.title }}
        </h1>
        <p class="mb-45 fw-medium text-white ps-lg-30">{{ i.text }}</p>

        <!-- دکمه‌ها: در موبایل کنار هم -->
        <div class="buttons-wrapper">
            <a class="btn btn-accent-1" href="tel:{% render_partial 'company:mobile_number' %}">
                <span class="btn-content">
                    تماس با ما
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 15 15">
                        <path fill="currentColor" d="M15 11.23v2.259a1.501 1.501 0 0 1-1.026 1.432c-.199.067-.41.092-.619.073a14.944 14.944 0 0 1-6.508-2.31A14.692 14.692 0 0 1 2.32 8.166 14.877 14.877 0 0 1 .006 1.641 1.503 1.503 0 0 1 .9.13 1.51 1.51 0 0 1 1.507 0H3.77a1.51 1.51 0 0 1 1.508 1.295c.095.722.273 1.432.528 2.115a1.503 1.503 0 0 1-.34 1.588l-.957.956a12.055 12.055 0 0 0 4.525 4.516l.958-.956a1.51 1.51 0 0 1 1.591-.338 9.7 9.7 0 0 0 2.12.527 1.509 1.509 0 0 1 1.296 1.527Z"/>
                    </svg>
                </span>
            </a>

            <a class="btn btn-accent-1" href="tel:{% render_partial 'company:mobile_number' %}">
                <span class="btn-content">
                    {% render_partial 'company:mobile_number' %}
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 15 15">
                        <path fill="currentColor" d="M15 11.23v2.259a1.501 1.501 0 0 1-1.026 1.432c-.199.067-.41.092-.619.073a14.944 14.944 0 0 1-6.508-2.31A14.692 14.692 0 0 1 2.32 8.166 14.877 14.877 0 0 1 .006 1.641 1.503 1.503 0 0 1 .9.13 1.51 1.51 0 0 1 1.507 0H3.77a1.51 1.51 0 0 1 1.508 1.295c.095.722.273 1.432.528 2.115a1.503 1.503 0 0 1-.34 1.588l-.957.956a12.055 12.055 0 0 0 4.525 4.516l.958-.956a1.51 1.51 0 0 1 1.591-.338 9.7 9.7 0 0 0 2.12.527 1.509 1.509 0 0 1 1.296 1.527Z"/>
                    </svg>
                </span>
            </a>
        </div>
    </div>
</div>

<style>
    /* استایل سفارشی برای دکمه‌ها */
    .buttons-wrapper {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .buttons-wrapper .btn {
        flex: 1 1 auto;
        min-width: 120px;
        padding: 8px 12px;
        font-size: 0.9rem;
    }

    .btn-content {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-icon {
        width: 12px;
        height: 12px;
        margin-right: 6px;
        margin-left: 6px;
    }

    /* برای دستگاه‌های بزرگتر */
    @media (min-width: 768px) {
        .buttons-wrapper .btn {
            flex: 0 0 auto;
            padding: 10px 16px;
            font-size: 1rem;
            min-width: auto;
        }

        .btn-icon {
            width: 15px;
            height: 15px;
            margin-right: 8px;
            margin-left: 8px;
        }
    }
</style>
{% endfor %}
